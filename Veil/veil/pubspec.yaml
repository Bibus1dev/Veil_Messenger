name: veil_messenger
description: Secure messenger with end-to-end encryption
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.1.1
  
  # Media
  image_picker: ^1.0.4
  video_thumbnail: ^0.5.3
  flutter_image_compress: ^2.1.0
  video_compress: ^3.1.2
  video_player: ^2.8.2
  mime: ^1.0.5
  http_parser: ^4.0.2
  path: ^1.8.3
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Encryption
  encrypt: ^5.0.1
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  connectivity_plus: ^5.0.2
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  url_launcher: ^6.2.5
  flutter_inappwebview: ^6.0.0  # Добавьте эту строку
  no_screenshot: ^1.0.0
  flutter_colorpicker: ^1.0.3
  nothing_glyph_interface: ^0.0.10
  device_info_plus: ^9.1.2

  just_audio: ^0.9.36
  audio_session: ^0.1.18 # Рекомендуется для just_audio
  audio_waveforms: ^1.3.0
  camera: ^0.10.5+9
  
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/veil_startscreen.png
    - assets/images/glyph_layout.png
    - assets/MessageSounds/SendingMessage_1.mp3
    - assets/MessageSounds/SendingMessage_2.mp3
    - assets/MessageSounds/ReceivingMessage_1.mp3
    - assets/MessageSounds/ReceivingMessage_2.mp3
    - assets/MessageSounds/ReceivingMessage_3.mp3